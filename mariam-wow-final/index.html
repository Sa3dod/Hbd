<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mariam Birthday</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
<div id="flowers"></div>

<section id="s1" class="active">
<div class="cloud">☁️</div><div class="cloud c2">☁️</div>
<div class="envelope" id="env">
<div class="flap"></div>
<div class="letter">For Mariam 🌼</div>
</div>
<h1>A Little Birthday Surprise ✨</h1>
<p>Tap the envelope</p>
</section>

<section id="s2">
<h2 id="type"></h2>
<div class="cake">
<div id="candles"></div>
<div class="layer l3"></div>
<div class="layer l2"></div>
<div class="layer l1"></div>
</div>
<div id="count">Candles Left: 5</div>
</section>

<section id="s3">
<div class="card">
<h1>Happy Birthday Mariam 🌼</h1>
<p>Wishing you happiness, success, good coffee, beautiful memories and lots of reasons to smile. Thank you for being such an amazing friend ☕✨</p>
<h3>23 July 🌼</h3>
<button onclick="newQuote()">☕ One More Surprise</button>
<p id="quote"></p>
</div>
</section>
<script src="script.js"></script>
</body></html>
